services:
  tiktok-bot:
    image: ghcr.io/diator777/tiktok-fire-automation:latest
    container_name: tiktok-automation-bot
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./cookies.json:/app/cookies.json
      - ./logs:/app/logs
      - ./user_profile:/app/user_profile